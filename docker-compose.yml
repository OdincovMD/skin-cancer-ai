name: skin

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      - HOST=${HOST}
    ports:
      - "90:90"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/var/www/html
    networks:
      - app-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - BACKEND_URL=${BACKEND_URL}
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    networks:
      - app-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    environment:
      - MODEL_CACHE_MEMORY_LIMIT_MB=${MODEL_CACHE_MEMORY_LIMIT_MB:-4608}
      - MODEL_CACHE_IDLE_TTL_SECONDS=${MODEL_CACHE_IDLE_TTL_SECONDS:-600}
      - ISOLATED_RARE_MODEL_WORKERS=${ISOLATED_RARE_MODEL_WORKERS:-1}
    expose:
      - "8000"
    networks:
      - app-network
    volumes:
      - ./ml/weight:/app/weight
      - ./log:/app/log
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "9000"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ml:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 8
      start_period: 60s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: celery -A workers worker --loglevel=info --concurrency=1
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ml:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-bookworm
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "7178:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
  minio:
    image: minio/minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_SERVER_URL: "http://0.0.0.0:9000"
    expose:
      - "9000"
    ports:
      - "1112:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

networks:
  app-network:
    external: true
    name: skin-ai-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
